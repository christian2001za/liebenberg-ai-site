          - paragraph [ref=e157]: We duiken diep in uw huidige situatie, processen en wensen. Waar zit de inefficiëntie? Wat is technisch haalbaar? We leveren een voorstel met duidelijk gedefinieerde scope en een budget.
        - generic [ref=e158]:
          - generic [ref=e159]: "02"
          - heading "Proof of Concept (PoC)" [level=3] [ref=e161]
          - paragraph [ref=e163]: Binnen 2-4 weken bouwen we een werkend prototype in een afgeschermde omgeving. We valideren de output-kwaliteit met statistische methoden. We kijken samen naar de resultaten en bespreken de volgende stappen.
        - generic [ref=e164]:
          - generic [ref=e165]: "03"
          - heading "Production Deployment" [level=3] [ref=e167]
          - paragraph [ref=e169]: Na validatie bouwen we in iteraties de productie-versie. Focus op security, rate-limiting, error-handling en integratie met bestaande systemen.
        - generic [ref=e170]:
