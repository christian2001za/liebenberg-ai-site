          - paragraph [ref=e109]: Onze expertise
          - heading "Specialisaties" [level=2] [ref=e110]:
            - emphasis [ref=e111]: Specialisaties
        - paragraph [ref=e113]: Wij leveren complete oplossingen. Onze achtergrond in econometrie garandeert dat we de fundamentele wiskunde en data achter AI begrijpen en dit kunnen toepassen op bedrijfskritische processen.
      - generic [ref=e114]:
        - generic [ref=e115]:
          - img [ref=e117]
          - heading "Intelligent Document Processing" [level=3] [ref=e119]
          - paragraph [ref=e120]: Unstructured data omzetten naar structured output. Wij bouwen pipelines die documenten, facturen en rapporten uitlezen, verwerken en direct wegschrijven in uw ERP of CRM systemen.
        - generic [ref=e121]:
          - img [ref=e123]
          - heading "Workflow Automation & Architectuur" [level=3] [ref=e127]
          - paragraph [ref=e128]: End-to-end procesoptimalisatie. We analyseren uw huidige processen en bouwen maatwerk AI-software om repititief werk grotendeels te automatiseren. Met human-in-the-loop voor controle.
        - generic [ref=e129]:
          - img [ref=e131]
          - heading "Semantic Search & RAG Systems" [level=3] [ref=e135]
          - paragraph [ref=e136]: Retrieval-Augmented Generation (RAG) op uw eigen data en documenten. Veilig en afgeschermd. Maak uw interne kennisbank doorzoekbaar met AI die bronverwijzingen geeft en halluciniaties minimaliseert.
        - generic [ref=e137]:
          - img [ref=e139]
          - heading "Generative AI Integration" [level=3] [ref=e142]
          - paragraph [ref=e143]: Het trainen van generatieve AI-modellen op uw bedrijfsspecifieke tone-of-voice en data. Voor geautomatiseerde klantcommunicatie of content generatie die bijna niet van menselijk te onderscheiden is.
